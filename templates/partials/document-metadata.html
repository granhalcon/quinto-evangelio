{% if page.extra.metadata %}
<dl class="document-metadata" aria-label="Datos editoriales del documento">
  {% for item in page.extra.metadata %}
  <div class="document-metadata__item{% if item.featured %} document-metadata__item--featured{% endif %}">
    <dt>{{ item.label }}</dt>
    <dd>{{ item.value | markdown | safe }}</dd>
  </div>
  {% endfor %}
</dl>
{% endif %}
