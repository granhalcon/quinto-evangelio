<aside class="book-navigation book-navigation--desktop">
  <nav class="book-navigation__body" aria-label="Capítulos de {{ book.title }}">
    <p class="book-navigation__title">
      <a href="{{ book.permalink | safe }}">{{ book.title }}</a>
    </p>
    <ol>
      {% for chapter in book.pages %}
      <li>
        <a
          href="{{ chapter.permalink | safe }}"
          {% if current_permalink and chapter.permalink == current_permalink %}aria-current="page"{% endif %}
        >{{ chapter.title }}</a>
      </li>
      {% endfor %}
    </ol>
  </nav>
</aside>

<details class="book-navigation book-navigation--mobile">
  <summary>Capítulos</summary>
  <nav class="book-navigation__body" aria-label="Capítulos de {{ book.title }}">
    <p class="book-navigation__title">
      <a href="{{ book.permalink | safe }}">{{ book.title }}</a>
    </p>
    <ol>
      {% for chapter in book.pages %}
      <li>
        <a
          href="{{ chapter.permalink | safe }}"
          {% if current_permalink and chapter.permalink == current_permalink %}aria-current="page"{% endif %}
        >{{ chapter.title }}</a>
      </li>
      {% endfor %}
    </ol>
  </nav>
</details>
